name: API Automation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Cucumber Tag'
        required: true
        default: '@Regression'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Cucumber Tests
        run: |
          mvn clean test \
          -Dcucumber.filter.tags="${{ github.event.inputs.tag }}"

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: target
